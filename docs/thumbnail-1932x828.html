<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face { font-family: 'Galmuri11'; src: url('../src/assets/fonts/Galmuri11.woff2') format('woff2'); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1932px; height: 828px; overflow: hidden;
  background: #0a0610;
  background-image:
    radial-gradient(ellipse at 50% 100%, rgba(255,80,20,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 30% 90%, rgba(255,40,10,0.14) 0%, transparent 45%),
    radial-gradient(ellipse at 70% 85%, rgba(255,100,30,0.12) 0%, transparent 40%),
    radial-gradient(ellipse at 30% 20%, rgba(80,20,60,0.15) 0%, transparent 50%);
  position: relative;
  font-family: 'Galmuri11', monospace;
}

.vignette {
  position: absolute; inset: 0; pointer-events: none; z-index: 10;
  background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.85) 100%);
}
.scanlines {
  position: absolute; inset: 0; pointer-events: none; z-index: 11;
  background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px);
}
.stars { position: absolute; inset: 0; z-index: 0; }
.star { position: absolute; width: 2px; height: 2px; background: #e2e8f0; border-radius: 50%; opacity: 0.15; }

.skyline { position: absolute; bottom: 48%; left: 0; right: 0; z-index: 1; }
.bld { position: absolute; bottom: 0; border-radius: 2px 2px 0 0; }
.back .bld { background: #1a0c0e; opacity: 0.8; }
.front .bld {
  background: #0a0508;
  background-image:
    radial-gradient(circle, rgba(255,140,40,0.5) 1px, transparent 1px),
    radial-gradient(circle, rgba(255,60,20,0.4) 1px, transparent 1px);
  background-size: 8px 10px, 12px 14px;
  background-position: 4px 6px, 8px 3px;
}

.ground {
  position: absolute; bottom: 0; left: 0; right: 0; height: 48%; z-index: 2;
  background: linear-gradient(to bottom, #1e120e 0%, #140c08 20%, #0a0806 100%);
}
.ground::before {
  content: ''; position: absolute; top: -30px; left: 0; right: 0; height: 80px;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(255,80,20,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 45% 80%, rgba(255,50,10,0.25) 0%, transparent 45%),
    radial-gradient(ellipse at 70% 80%, rgba(255,100,30,0.22) 0%, transparent 40%),
    radial-gradient(ellipse at 90% 80%, rgba(255,60,15,0.2) 0%, transparent 45%);
}
.ground::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 16px;
  background: linear-gradient(to bottom, rgba(80,35,15,0.6) 0%, transparent 100%);
}

.ember {
  position: absolute; bottom: 50%; z-index: 3;
  width: 3px; height: 3px; border-radius: 50%;
  background: #ff6b2b; box-shadow: 0 0 6px rgba(255,107,43,0.6); opacity: 0.6;
}

.content {
  position: absolute; inset: 0; z-index: 5;
  display: flex; align-items: center; justify-content: center; gap: 60px;
}
.title-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.title-big { line-height: 1; }
.title-num {
  font-size: 100px; font-weight: 900; color: #a0dca4;
  text-shadow: 0 0 24px rgba(160,220,164,0.4), 0 0 80px rgba(160,220,164,0.2), 0 0 160px rgba(160,220,164,0.08);
  letter-spacing: -4px;
}
.title-unit { font-size: 50px; font-weight: 900; color: #e2e8f0; margin-left: 4px; }
.title-sub { font-size: 40px; font-weight: 700; color: #e2e8f0; letter-spacing: 10px; }
.title-tagline {
  font-size: 15px; color: #8cc890; letter-spacing: 3px; margin-top: 8px;
  text-shadow: 0 0 8px rgba(140,200,144,0.4);
}
</style>
</head>
